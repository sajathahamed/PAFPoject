# Test configuration for H2 in-memory database
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  # Mock OAuth2 config for tests
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - email
              - profile

jwt:
  secret: testSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256AlgorithmUsedInTests
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000

app:
  cors:
    allowed-origins: http://localhost:3000
  oauth2:
    redirect-uri: http://localhost:3000/oauth-callback

logging:
  level:
    root: WARN
    com.smartcampus: INFO
